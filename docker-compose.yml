networks:
  darsi-net:
    driver: bridge

services:
  postgres:
    image: postgres:16
    container_name: darsi-postgres
    networks:
      - darsi-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-darsi}
      POSTGRES_USER: ${POSTGRES_USER:-darsi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darsi_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pipeline/data/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-darsi_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: darsi-surrealdb
    networks:
      - darsi-net
    user: root
    command: start --log info --username ${SURREALDB_USER:-root} --password ${SURREALDB_PASSWORD:-root} surrealkv:///data/darsi
    ports:
      - "8001:8000"
    volumes:
      - surrealdb_data:/data
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: darsi-ollama
    networks:
      - darsi-net
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: darsi-backend
    networks:
      - darsi-net
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      SURREALDB_URL: http://surrealdb:8000
      OLLAMA_BASE_URL: http://ollama:11434
      MCP_SERVER_URL: http://mcp-server:8100
    depends_on:
      postgres:
        condition: service_healthy
      surrealdb:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: darsi-mcp-server
    networks:
      - darsi-net
    environment:
      SURREALDB_URL: http://surrealdb:8000
      SURREALDB_USER: ${SURREALDB_USER:-root}
      SURREALDB_PASSWORD: ${SURREALDB_PASSWORD:-root}
      SURREALDB_NS: ${SURREALDB_NS:-darsi}
      SURREALDB_DB: ${SURREALDB_DB:-operasional}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:2b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
    depends_on:
      surrealdb:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8100:8100"

  simrs-simulator:
    image: python:3.11-slim
    container_name: darsi-simrs-simulator
    networks:
      - darsi-net
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-darsi}
      POSTGRES_USER: ${POSTGRES_USER:-darsi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darsi_password}
      SIMULATOR_INTERVAL: "10"
      SIMULATOR_MIN_RECORDS: "1"
      SIMULATOR_MAX_RECORDS: "100"
    volumes:
      - ./pipeline/processors:/app
    working_dir: /app
    command: >
      bash -c "
        pip install --no-cache-dir pandas==2.2.3 sqlalchemy==2.0.41 psycopg2-binary==2.9.10 &&
        python simrs_simulator.py
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  pipeline-service:
    build:
      context: ./pipeline-service
      dockerfile: Dockerfile
    container_name: darsi-pipeline-service
    networks:
      - darsi-net
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-darsi}
      POSTGRES_USER: ${POSTGRES_USER:-darsi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darsi_password}
      SURREALDB_URL: http://surrealdb:8000
      SURREALDB_USER: ${SURREALDB_USER:-root}
      SURREALDB_PASSWORD: ${SURREALDB_PASSWORD:-root}
      SURREALDB_NS: ${SURREALDB_NS:-darsi}
      SURREALDB_DB: ${SURREALDB_DB:-operasional}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:2b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      PROCESSORS_DIR: /app/processors
    volumes:
      - ./pipeline/processors:/app/processors
    ports:
      - "8200:8200"
    depends_on:
      postgres:
        condition: service_healthy
      surrealdb:
        condition: service_started
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: darsi-n8n
    networks:
      - darsi-net
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
    depends_on:
      pipeline-service:
        condition: service_started
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: darsi-metabase
    networks:
      - darsi-net
    ports:
      - "3001:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: darsi-frontend
    networks:
      - darsi-net
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: darsi-nginx
    networks:
      - darsi-net
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - mcp-server
      - metabase
      - frontend

volumes:
  postgres_data:
  surrealdb_data:
  ollama_data:
  metabase_data:
  n8n_data: