services:
  postgres:
    image: postgres:16
    container_name: darsi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-darsi}
      POSTGRES_USER: ${POSTGRES_USER:-darsi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darsi_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-darsi_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: darsi-surrealdb
    command: start --log info --user ${SURREALDB_USER:-root} --pass ${SURREALDB_PASSWORD:-root} memory
    ports:
      - "8001:8000"

  chromadb:
    image: chromadb/chroma:1.0.12
    container_name: darsi-chromadb
    ports:
      - "8002:8000"
    volumes:
      - chromadb_data:/chroma/data

  ollama:
    image: ollama/ollama:latest
    container_name: darsi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: darsi-backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      SURREALDB_URL: http://surrealdb:8000
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      OLLAMA_BASE_URL: http://ollama:11434
      MCP_SERVER_URL: http://mcp-server:8100
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      surrealdb:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: darsi-mcp-server
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      SURREALDB_URL: http://surrealdb:8000
      SURREALDB_USER: ${SURREALDB_USER:-root}
      SURREALDB_PASSWORD: ${SURREALDB_PASSWORD:-root}
      SURREALDB_NS: ${SURREALDB_NS:-darsi}
      SURREALDB_DB: ${SURREALDB_DB:-operasional}
    depends_on:
      - chromadb
      - surrealdb
    ports:
      - "8100:8100"

  metabase:
    image: metabase/metabase:latest
    container_name: darsi-metabase
    ports:
      - "3001:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: darsi-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - mcp-server
      - metabase

  airflow:
    image: apache/airflow:2.9.2-python3.11
    container_name: darsi-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-darsi}
      POSTGRES_USER: ${POSTGRES_USER:-darsi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darsi_password}
      SURREALDB_URL: http://surrealdb:8000
      SURREALDB_USER: ${SURREALDB_USER:-root}
      SURREALDB_PASSWORD: ${SURREALDB_PASSWORD:-root}
      SURREALDB_NS: ${SURREALDB_NS:-darsi}
      SURREALDB_DB: ${SURREALDB_DB:-operasional}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data/ingestion:/opt/airflow/scripts
      - ./data/sample_simrs:/opt/airflow/data/sample_simrs
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8888:8080"
    command: >
      bash -c "
        pip install --no-cache-dir pandas==2.2.3 numpy==2.0.2 sqlalchemy==2.0.41 psycopg2-binary==2.9.10 requests==2.32.3 chromadb-client==0.6.3 &&
        airflow db migrate &&
        (airflow users create --username admin --firstname Admin --lastname DARSI --role Admin --email admin@darsi.id --password admin || true) &&
        airflow webserver &
        airflow scheduler
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  airflow_logs:
  ollama_data:
  chromadb_data:
  metabase_data:
